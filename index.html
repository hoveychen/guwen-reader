<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>古籍阅读 · 中华典籍</title>
<style>
  :root{
    --paper:#f3ecd8;
    --paper-2:#ece3cc;
    --ink:#2b2118;
    --ink-soft:#5b4d3c;
    --accent:#8a3b2e;        /* 朱砂 */
    --accent-soft:#b5654a;
    --line:#d8ccad;
    --side:#efe7d0;
    --side-2:#e6dcc0;
    --shadow:0 8px 30px rgba(60,40,20,.12);
    --reader-fs:20px;
    --reader-lh:2.05;
    --reader-w:40em;
  }
  html.dark:root{
    --paper:#211c16;
    --paper-2:#1a160f;
    --ink:#ddd0b8;
    --ink-soft:#a99a7e;
    --accent:#d08263;
    --accent-soft:#c2745a;
    --line:#3a3225;
    --side:#1e1a13;
    --side-2:#262017;
    --shadow:0 8px 30px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:"Songti SC","SimSun","Source Han Serif SC","Noto Serif SC",STSong,serif;
    background:var(--paper);color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  button{font-family:inherit;cursor:pointer}

  /* ===== 顶栏 ===== */
  .topbar{
    height:56px;display:flex;align-items:center;gap:12px;padding:0 16px;
    background:linear-gradient(180deg,var(--side),var(--side-2));
    border-bottom:1px solid var(--line);position:relative;z-index:30;
  }
  .brand{font-size:20px;font-weight:700;letter-spacing:2px;color:var(--accent);
    white-space:nowrap;display:flex;align-items:center;gap:8px;cursor:pointer}
  .brand .seal{
    display:inline-flex;align-items:center;justify-content:center;
    width:30px;height:30px;border-radius:6px;background:var(--accent);color:#f3ecd8;
    font-size:16px;font-weight:700;box-shadow:inset 0 0 0 2px rgba(255,255,255,.25)}
  .search-wrap{flex:1;max-width:560px;position:relative}
  #search{
    width:100%;height:38px;padding:0 38px 0 38px;border-radius:20px;
    border:1px solid var(--line);background:var(--paper);color:var(--ink);
    font-size:15px;outline:none;font-family:inherit;transition:border-color .2s,box-shadow .2s}
  #search:focus{border-color:var(--accent-soft);box-shadow:0 0 0 3px rgba(138,59,46,.12)}
  .search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);
    color:var(--ink-soft);font-size:15px;pointer-events:none}
  .search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);
    border:none;background:transparent;color:var(--ink-soft);font-size:18px;
    width:26px;height:26px;border-radius:50%;display:none}
  .search-clear:hover{background:var(--side-2)}
  .tools{display:flex;align-items:center;gap:6px;margin-left:auto}
  .tbtn{height:34px;min-width:34px;padding:0 10px;border-radius:8px;border:1px solid var(--line);
    background:var(--paper);color:var(--ink-soft);font-size:14px;display:inline-flex;
    align-items:center;justify-content:center;gap:5px;transition:.15s}
  .tbtn:hover{color:var(--accent);border-color:var(--accent-soft)}
  .tbtn.on{color:var(--accent);border-color:var(--accent-soft);background:var(--paper-2)}
  .menu-btn{display:none}

  /* ===== 主体 ===== */
  .main{display:flex;height:calc(100% - 56px);position:relative}

  /* 左：书目/搜索 */
  .sidebar{
    width:300px;flex-shrink:0;background:var(--side);border-right:1px solid var(--line);
    display:flex;flex-direction:column;overflow:hidden}
  .side-head{padding:10px 14px;font-size:12px;letter-spacing:1px;color:var(--ink-soft);
    border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .side-list{flex:1;overflow:auto;padding:6px 0}
  .side-list::-webkit-scrollbar,.reader::-webkit-scrollbar,.toc::-webkit-scrollbar{width:9px;height:9px}
  .side-list::-webkit-scrollbar-thumb,.reader::-webkit-scrollbar-thumb,.toc::-webkit-scrollbar-thumb{
    background:var(--line);border-radius:6px}
  .cat{margin:1px 8px;border-radius:8px;overflow:hidden}
  .cat-h{display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:15px;font-weight:600;
    color:var(--ink);border-radius:8px;user-select:none}
  .cat-h:hover{background:var(--side-2)}
  .cat-h .cnt{margin-left:auto;font-size:12px;font-weight:400;color:var(--ink-soft)}
  .cat-h .arr{font-size:11px;color:var(--ink-soft);transition:transform .2s}
  .cat.open .cat-h .arr{transform:rotate(90deg)}
  .cat-body{display:none;padding:2px 0 6px}
  .cat.open .cat-body{display:block}
  .sub-h{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 22px;font-size:13px;
    color:var(--ink-soft);font-weight:600;user-select:none}
  .sub-h:hover{color:var(--accent)}
  .sub-h .arr{font-size:10px;transition:transform .2s}
  .sub.open .sub-h .arr{transform:rotate(90deg)}
  .sub-body{display:none}
  .sub.open .sub-body{display:block}
  .book-item{display:block;padding:6px 12px 6px 34px;font-size:14px;color:var(--ink);
    cursor:pointer;border-left:3px solid transparent;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis}
  .book-item:hover{background:var(--side-2);color:var(--accent)}
  .book-item.active{background:var(--paper-2);color:var(--accent);border-left-color:var(--accent);font-weight:600}
  .book-item .meta{font-size:11px;color:var(--ink-soft);margin-left:6px}
  .cat-h.sub-pad .arr{visibility:hidden}

  /* 搜索结果 */
  .result-item{padding:8px 14px;cursor:pointer;border-bottom:1px solid var(--line)}
  .result-item:hover{background:var(--side-2)}
  .result-item .rt{font-size:15px;color:var(--ink)}
  .result-item:hover .rt{color:var(--accent)}
  .result-item .rm{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .result-item mark{background:rgba(138,59,46,.22);color:inherit;border-radius:3px;padding:0 1px}
  .empty-hint{padding:30px 16px;text-align:center;color:var(--ink-soft);font-size:14px;line-height:1.8}

  /* 右：阅读区 + 章节 */
  .reader-wrap{flex:1;display:flex;min-width:0;position:relative;background:var(--paper)}
  .toc{width:210px;flex-shrink:0;border-right:1px solid var(--line);background:var(--paper-2);
    overflow:auto;padding:10px 0;display:none}
  .toc.show{display:block}
  .toc-title{padding:6px 14px 10px;font-size:12px;letter-spacing:2px;color:var(--ink-soft);
    border-bottom:1px solid var(--line);margin-bottom:6px}
  .toc-item{padding:6px 14px;font-size:13px;color:var(--ink-soft);cursor:pointer;
    border-left:3px solid transparent;line-height:1.5}
  .toc-item:hover{color:var(--accent);background:var(--side-2)}
  .toc-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--side-2);font-weight:600}

  .reader{flex:1;overflow:auto;position:relative;scroll-behavior:smooth}
  .progress{position:absolute;top:0;left:0;height:3px;background:var(--accent);width:0;z-index:5;
    transition:width .1s linear}
  .doc{max-width:var(--reader-w);margin:0 auto;padding:48px 32px 120px}
  .doc h1{font-size:30px;text-align:center;color:var(--ink);margin:8px 0 4px;letter-spacing:2px}
  .doc .doc-meta{text-align:center;color:var(--ink-soft);font-size:14px;margin-bottom:8px}
  .doc .rule{width:60px;height:2px;background:var(--accent);margin:18px auto 30px;opacity:.6}
  .doc h3.chap{font-size:20px;color:var(--accent);margin:42px 0 18px;text-align:center;
    font-weight:700;letter-spacing:1px;scroll-margin-top:20px}
  .doc h3.chap::before,.doc h3.chap::after{content:"❖";color:var(--accent-soft);
    font-size:13px;margin:0 12px;vertical-align:middle;opacity:.6}
  .doc p{font-size:var(--reader-fs);line-height:var(--reader-lh);margin:0 0 1.05em;
    text-indent:2em;text-align:justify;color:var(--ink);letter-spacing:.02em}
  .doc p mark{background:rgba(138,59,46,.28);border-radius:3px;padding:0 2px}

  /* 竖排 */
  .reader.vertical{scroll-behavior:smooth}
  .reader.vertical .doc{writing-mode:vertical-rl;-webkit-writing-mode:vertical-rl;
    max-width:none;height:100%;max-height:none;margin:0;padding:40px 60px;
    width:max-content}
  .reader.vertical .doc h1{writing-mode:vertical-rl;text-align:start;margin:0 8px;height:auto}
  .reader.vertical .doc .doc-meta,.reader.vertical .doc .rule{display:none}
  .reader.vertical .doc h3.chap{margin:0 30px;height:auto}
  .reader.vertical .doc p{text-indent:2em;margin:0 0 0 1.2em;height:100%}

  /* 落地页 */
  .welcome{max-width:900px;margin:0 auto;padding:50px 28px}
  .welcome h2{font-size:26px;color:var(--accent);text-align:center;letter-spacing:3px;margin:6px 0}
  .welcome .sub{text-align:center;color:var(--ink-soft);font-size:15px;margin-bottom:36px}
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  .cat-card{background:var(--side);border:1px solid var(--line);border-radius:12px;
    padding:20px 14px;text-align:center;cursor:pointer;transition:.18s;box-shadow:var(--shadow)}
  .cat-card:hover{transform:translateY(-3px);border-color:var(--accent-soft)}
  .cat-card .cc-name{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:2px}
  .cat-card .cc-cnt{font-size:13px;color:var(--ink-soft);margin-top:6px}
  .cat-card .cc-seal{font-size:24px;color:var(--accent);opacity:.85}

  /* 浮动控制（返回顶部 / 移动端目录） */
  .fab{position:absolute;right:22px;bottom:26px;width:46px;height:46px;border-radius:50%;
    background:var(--accent);color:#f3ecd8;border:none;font-size:20px;box-shadow:var(--shadow);
    display:none;align-items:center;justify-content:center;z-index:8}
  .fab.show{display:flex}

  .scrim{display:none;position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:19}

  /* 移动端 */
  @media (max-width:820px){
    .menu-btn{display:inline-flex}
    .sidebar{position:absolute;left:0;top:0;bottom:0;z-index:20;transform:translateX(-100%);
      transition:transform .25s;box-shadow:var(--shadow)}
    .sidebar.open{transform:translateX(0)}
    .scrim.show{display:block}
    .brand{font-size:17px}.brand .label{display:none}
    .search-wrap{max-width:none}
    .tools .label{display:none}
    .toc{position:absolute;left:0;top:0;bottom:0;z-index:18;transform:translateX(-100%);
      transition:transform .25s;width:240px}
    .toc.show{display:block;transform:translateX(0);box-shadow:var(--shadow)}
    .doc{padding:30px 20px 100px}
    :root{--reader-fs:18px}
  }
</style>
</head>
<body>
  <div class="topbar">
    <button class="tbtn menu-btn" id="menuBtn" title="书目">☰</button>
    <div class="brand" id="homeBtn"><span class="seal">籍</span><span class="label">中华古籍阅读</span></div>
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input id="search" type="search" placeholder="搜索书名、作者、分类…" autocomplete="off">
      <button class="search-clear" id="searchClear">×</button>
    </div>
    <div class="tools">
      <button class="tbtn" id="tocBtn" title="本书目录">目录</button>
      <button class="tbtn" id="fsMinus" title="缩小字号">A−</button>
      <button class="tbtn" id="fsPlus" title="放大字号">A＋</button>
      <button class="tbtn" id="dirBtn" title="横竖排切换"><span class="label">竖排</span><span style="display:none">横排</span></button>
      <button class="tbtn" id="themeBtn" title="日夜模式">🌙</button>
    </div>
  </div>

  <div class="main">
    <div class="scrim" id="scrim"></div>
    <aside class="sidebar" id="sidebar">
      <div class="side-head"><span id="sideTitle">典藏书目</span><span id="sideCount"></span></div>
      <div class="side-list" id="sideList"></div>
    </aside>

    <div class="reader-wrap">
      <nav class="toc" id="toc"></nav>
      <div class="reader" id="reader">
        <div class="progress" id="progress"></div>
        <div id="content"></div>
        <button class="fab" id="topFab" title="返回顶部">↑</button>
      </div>
    </div>
  </div>

<script>
"use strict";
const DATA_URL = "manifest.json";
/* GitHub Pages 只部署代码与索引（语料 4.7GB 超出 Pages 限额），
   正文在 *.github.io 域名下改从仓库 raw 按需拉取 */
const CORPUS_RAW = "https://raw.githubusercontent.com/hoveychen/guwen-reader/main/";
const MD_BASE = (location.hostname.endsWith(".github.io") ? CORPUS_RAW : "") + "markdown/";
const LS = {
  fs:"gw_fs", dir:"gw_dir", theme:"gw_theme", last:"gw_last", pos:"gw_pos"
};

let M = null;                 // manifest
let byCat = [];               // [{name, idx, subs:Map(sub->[books]), direct:[books]}]
let curBook = null;
let curHeadings = [];         // [{id, text, el}]
let searchTimer = null;

const $ = s => document.querySelector(s);
const el = (tag, cls, txt) => { const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; };

/* ---------- 启动 ---------- */
init();
async function init(){
  applySavedPrefs();
  bindUI();
  try{
    const r = await fetch(DATA_URL);
    if(!r.ok) throw new Error("HTTP "+r.status);
    M = await r.json();
  }catch(e){
    $("#content").innerHTML = '<div class="empty-hint">无法加载书目索引 manifest.json。<br>请通过 HTTP 服务器访问（如 <code>python3 -m http.server</code>），不要直接用 file:// 打开。<br><br>'+e.message+'</div>';
    return;
  }
  groupBooks();
  renderBrowse();
  $("#sideCount").textContent = M.count.toLocaleString()+" 部";
  routeFromHash() || showWelcome();
}

function groupBooks(){
  byCat = M.categories.map((name,i)=>({name, idx:i, subs:new Map(), direct:[]}));
  for(const b of M.books){
    const g = byCat[b.c];
    if(!g) continue;
    if(b.s){
      const top = b.s.split("/")[0];
      if(!g.subs.has(top)) g.subs.set(top, []);
      g.subs.get(top).push(b);
    }else{
      g.direct.push(b);
    }
  }
}

/* ---------- 偏好 ---------- */
function applySavedPrefs(){
  const fs = parseInt(localStorage.getItem(LS.fs)||"20",10);
  setFontSize(fs, true);
  if(localStorage.getItem(LS.theme)==="dark") document.documentElement.classList.add("dark"), updThemeBtn();
  if(localStorage.getItem(LS.dir)==="v") setVertical(true, true);
}
function setFontSize(px, silent){
  px = Math.max(15, Math.min(30, px));
  document.documentElement.style.setProperty("--reader-fs", px+"px");
  document.documentElement.style.setProperty("--reader-lh", (1.7 + (px-15)*0.03).toFixed(2));
  if(!silent) localStorage.setItem(LS.fs, px);
}
function curFs(){ return parseInt(getComputedStyle(document.documentElement).getPropertyValue("--reader-fs"),10)||20; }

function setVertical(on, silent){
  $("#reader").classList.toggle("vertical", on);
  const b=$("#dirBtn"); b.children[0].style.display=on?"none":""; b.children[1].style.display=on?"":"none";
  b.classList.toggle("on", on);
  if(!silent) localStorage.setItem(LS.dir, on?"v":"h");
}
function updThemeBtn(){ $("#themeBtn").textContent = document.documentElement.classList.contains("dark")?"☀️":"🌙"; }

/* ---------- 浏览树 ---------- */
function renderBrowse(){
  $("#sideTitle").textContent="典藏书目";
  const root = $("#sideList"); root.innerHTML="";
  for(const g of byCat){
    const total = g.direct.length + [...g.subs.values()].reduce((a,x)=>a+x.length,0);
    const cat = el("div","cat"); cat.dataset.cat=g.idx;
    const h = el("div","cat-h");
    h.append(el("span","arr","▶"), el("span",null,g.name), Object.assign(el("span","cnt"),{textContent:total}));
    cat.append(h);
    const body = el("div","cat-body"); cat.append(body);
    let built=false;
    h.onclick=()=>{
      cat.classList.toggle("open");
      if(!built){ buildCatBody(body,g); built=true; }
    };
    root.append(cat);
  }
}
function buildCatBody(body,g){
  // 子分类
  for(const [sname,books] of g.subs){
    const sub=el("div","sub");
    const sh=el("div","sub-h");
    sh.append(el("span","arr","▶"), el("span",null,sname), Object.assign(el("span","cnt"),{textContent:" ("+books.length+")",style:"color:var(--ink-soft);font-weight:400;font-size:12px"}));
    sub.append(sh);
    const sb=el("div","sub-body"); sub.append(sb);
    let built=false;
    sh.onclick=()=>{ sub.classList.toggle("open"); if(!built){ books.forEach(b=>sb.append(bookItem(b))); built=true; } };
    body.append(sub);
  }
  // 直属书
  g.direct.forEach(b=>body.append(bookItem(b)));
}
function bookItem(b){
  const it=el("div","book-item"); it.textContent=b.t; it.dataset.path=b.p; it.title=b.t+(b.a?(" · "+b.a):"");
  if(b.a){ const m=el("span","meta",b.a); it.append(m); }
  it.onclick=()=>openBook(b);
  return it;
}

/* ---------- 搜索 ---------- */
function doSearch(q){
  q=q.trim();
  $("#searchClear").style.display=q?"block":"none";
  if(!q){ $("#sideTitle").textContent="典藏书目"; renderBrowse(); return; }
  const ql=q.toLowerCase();
  const res=[];
  for(const b of M.books){
    const cat=M.categories[b.c];
    if(b.t.toLowerCase().includes(ql) || (b.a&&b.a.includes(q)) || cat.includes(q) || (b.s&&b.s.includes(q))){
      res.push(b);
      if(res.length>=400) break;
    }
  }
  // 标题命中优先
  res.sort((a,b)=>{
    const ai=a.t.toLowerCase().includes(ql)?0:1, bi=b.t.toLowerCase().includes(ql)?0:1;
    return ai-bi || a.t.length-b.t.length;
  });
  $("#sideTitle").textContent="搜索结果";
  const list=$("#sideList"); list.innerHTML="";
  if(!res.length){ list.append(Object.assign(el("div","empty-hint"),{innerHTML:"未找到与 “"+esc(q)+"” 相关的书籍"})); return; }
  const head=el("div","empty-hint"); head.style.padding="8px 14px"; head.style.textAlign="left";
  head.textContent="命中 "+res.length+(res.length>=400?"+":"")+" 部";
  list.append(head);
  for(const b of res){
    const it=el("div","result-item"); it.dataset.path=b.p;
    const rt=el("div","rt"); rt.innerHTML=hl(b.t,q); it.append(rt);
    const meta=[M.categories[b.c]]; if(b.s)meta.push(b.s.split("/").pop()); if(b.a)meta.push(b.a);
    it.append(Object.assign(el("div","rm"),{innerHTML:hl(meta.join(" · "),q)}));
    it.onclick=()=>openBook(b);
    list.append(it);
  }
}
function hl(text,q){ if(!q)return esc(text); const i=text.toLowerCase().indexOf(q.toLowerCase()); if(i<0)return esc(text);
  return esc(text.slice(0,i))+"<mark>"+esc(text.slice(i,i+q.length))+"</mark>"+esc(text.slice(i+q.length)); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---------- 打开书籍 ---------- */
async function openBook(b){
  curBook=b;
  closeMobilePanels();
  history.replaceState(null,"","#"+encodeURIComponent(b.p));
  localStorage.setItem(LS.last, b.p);
  markActive(b.p);
  const reader=$("#reader");
  $("#content").innerHTML='<div class="empty-hint">正在展卷……</div>';
  $("#toc").innerHTML=""; $("#toc").classList.remove("show"); curHeadings=[];
  reader.scrollTop=0; reader.scrollLeft=0;
  let text;
  try{
    const r=await fetch(MD_BASE+b.p.split("/").map(encodeURIComponent).join("/"));
    if(!r.ok) throw new Error("HTTP "+r.status);
    text=await r.text();
  }catch(e){
    $("#content").innerHTML='<div class="empty-hint">无法加载《'+esc(b.t)+'》<br>'+esc(e.message)+'</div>';
    return;
  }
  renderBook(b, text);
  restorePos(b.p);
}

function renderBook(b, text){
  const lines=text.split(/\r?\n/);
  const doc=el("div","doc");
  // 标题
  let title=b.t, metaLine=b.a||"";
  // 去掉首个 # 标题行
  let start=0;
  while(start<lines.length && lines[start].trim()==="") start++;
  if(start<lines.length && /^#\s*/.test(lines[start])){ const t=lines[start].replace(/^#\s*/,"").trim(); if(t)title=t; start++; }
  const h1=el("h1",null,title); doc.append(h1);
  if(metaLine) doc.append(el("div","doc-meta",metaLine));
  doc.append(el("div","rule"));

  const headings=[];
  let hidx=0;
  const seenDiv=new Set();   // 收敛重复的卷/第 分隔标签（如反复出现的“卷上诸论”）
  const isDivider=t=>t.length<=10 && /^(卷|第[一二三四五六七八九十百千零\d])/.test(t);
  for(let i=start;i<lines.length;i++){
    const raw=lines[i];
    const s=raw.trim();
    if(!s) continue;
    let ht=null;
    if(/^#{1,6}\s*/.test(s)){ const t=s.replace(/^#{1,6}\s*/,"").trim(); if(t)ht=t; }
    else if(isHeading(s)){ ht=s; }
    if(ht!=null){
      if(isDivider(ht) && seenDiv.has(ht)) continue;   // 跳过重复出现的卷/第分隔标签
      if(isDivider(ht)) seenDiv.add(ht);
      doc.append(makeHeading(ht,headings,hidx++));
      continue;
    }
    const p=el("p",null,s); doc.append(p);
  }
  $("#content").innerHTML=""; $("#content").append(doc);
  curHeadings=headings;
  buildTOC(headings);
}

function makeHeading(t,headings,idx){
  const h=el("h3","chap",t); h.id="chap-"+idx;
  headings.push({id:h.id, text:t, el:h});
  return h;
}
// 启发式：短行、无正文标点 => 章节标题
const BODY_PUNCT=/[。！？；，、：「」『』（）()]/;
function isHeading(s){
  if(s.length>24) return false;
  if(BODY_PUNCT.test(s)) return false;
  if(/^[0-9a-zA-Z]+$/.test(s)) return false;
  return true;
}

function buildTOC(headings){
  const toc=$("#toc");
  if(headings.length<2){ toc.innerHTML=""; toc.classList.remove("show"); $("#tocBtn").classList.remove("on"); return; }
  toc.innerHTML="";
  toc.append(el("div","toc-title","目  录"));
  headings.forEach(h=>{
    const it=el("div","toc-item",h.text); it.dataset.id=h.id;
    it.onclick=()=>{ h.el.scrollIntoView({behavior:"smooth",block:"start"}); closeMobilePanels(); };
    toc.append(it);
  });
  // 桌面端默认展开目录
  if(window.innerWidth>820){ toc.classList.add("show"); $("#tocBtn").classList.add("on"); }
}

function markActive(path){
  document.querySelectorAll(".book-item.active").forEach(e=>e.classList.remove("active"));
  document.querySelectorAll('.book-item[data-path]').forEach(e=>{ if(e.dataset.path===path)e.classList.add("active"); });
}

/* ---------- 阅读进度 / 滚动 ---------- */
$("#reader").addEventListener("scroll", onScroll, {passive:true});
let scrollSaveTimer=null;
function onScroll(){
  const r=$("#reader");
  const vert=r.classList.contains("vertical");
  let ratio;
  if(vert){
    const max=r.scrollWidth-r.clientWidth;
    ratio = max>0 ? (-r.scrollLeft)/max : 0;   // vertical-rl 向左滚动为负
    if(r.scrollLeft<=0 && max>0) ratio=Math.abs(r.scrollLeft)/max;
  }else{
    const max=r.scrollHeight-r.clientHeight;
    ratio = max>0 ? r.scrollTop/max : 0;
  }
  ratio=Math.max(0,Math.min(1,ratio));
  $("#progress").style.width=(ratio*100)+"%";
  $("#topFab").classList.toggle("show", (vert? Math.abs(r.scrollLeft) : r.scrollTop)>400);
  // 高亮当前章节
  highlightTOC();
  // 记忆位置
  if(curBook){ clearTimeout(scrollSaveTimer); scrollSaveTimer=setTimeout(savePos,400); }
}
function highlightTOC(){
  if(!curHeadings.length) return;
  const r=$("#reader"); const vert=r.classList.contains("vertical");
  let active=null;
  for(const h of curHeadings){
    const rect=h.el.getBoundingClientRect();
    const pos = vert ? rect.right : rect.top;
    const ref = vert ? r.getBoundingClientRect().right-40 : 120;
    if(vert){ if(rect.right<=ref+1 && rect.right>0) active=h; }
    else{ if(rect.top<=ref) active=h; }
  }
  if(!active) active=curHeadings[0];
  document.querySelectorAll(".toc-item.active").forEach(e=>e.classList.remove("active"));
  const t=document.querySelector('.toc-item[data-id="'+active.id+'"]'); if(t){t.classList.add("active");}
}
function savePos(){
  const r=$("#reader");
  const v=r.classList.contains("vertical")? {l:r.scrollLeft} : {t:r.scrollTop};
  try{ localStorage.setItem(LS.pos, JSON.stringify({p:curBook.p, ...v})); }catch(e){}
}
function restorePos(path){
  try{
    const o=JSON.parse(localStorage.getItem(LS.pos)||"null");
    if(o&&o.p===path){ const r=$("#reader"); if(o.t)r.scrollTop=o.t; if(o.l)r.scrollLeft=o.l; }
  }catch(e){}
  onScroll();
}

/* ---------- 落地页 ---------- */
function showWelcome(){
  curBook=null; history.replaceState(null,"","#");
  $("#toc").innerHTML=""; $("#toc").classList.remove("show"); $("#tocBtn").classList.remove("on");
  const w=el("div","welcome");
  w.append(Object.assign(el("h2"),{textContent:"中 华 古 籍"}));
  w.append(el("div","sub","共收录 "+M.count.toLocaleString()+" 部典籍 · 十大藏 · 左侧检索或点选下方分类展卷"));
  const grid=el("div","cat-grid");
  for(const g of byCat){
    const total=g.direct.length+[...g.subs.values()].reduce((a,x)=>a+x.length,0);
    const c=el("div","cat-card");
    c.append(el("div","cc-seal",g.name[0]));
    c.append(el("div","cc-name",g.name));
    c.append(el("div","cc-cnt",total.toLocaleString()+" 部"));
    c.onclick=()=>{ openCatInSidebar(g.idx); };
    grid.append(c);
  }
  w.append(grid);
  $("#content").innerHTML=""; $("#content").append(w);
  $("#progress").style.width="0"; $("#topFab").classList.remove("show");
}
function openCatInSidebar(idx){
  $("#search").value=""; doSearch("");
  const cat=document.querySelector('.cat[data-cat="'+idx+'"]');
  if(cat){ const h=cat.querySelector(".cat-h"); if(!cat.classList.contains("open"))h.click();
    cat.scrollIntoView({block:"start"}); }
  if(window.innerWidth<=820) openSidebar();
}

/* ---------- 路由 ---------- */
function routeFromHash(){
  const h=decodeURIComponent(location.hash.replace(/^#/,""));
  if(h){ const b=M.books.find(x=>x.p===h); if(b){ openBook(b); return true; } }
  const last=localStorage.getItem(LS.last);
  if(last){ const b=M.books.find(x=>x.p===last); if(b){ openBook(b); return true; } }
  return false;
}

/* ---------- 交互绑定 ---------- */
function bindUI(){
  $("#search").addEventListener("input",e=>{ clearTimeout(searchTimer); const v=e.target.value;
    searchTimer=setTimeout(()=>doSearch(v),120); });
  $("#searchClear").onclick=()=>{ $("#search").value=""; doSearch(""); $("#search").focus(); };
  $("#homeBtn").onclick=showWelcome;
  $("#fsPlus").onclick=()=>setFontSize(curFs()+1);
  $("#fsMinus").onclick=()=>setFontSize(curFs()-1);
  $("#dirBtn").onclick=()=>{ setVertical(!$("#reader").classList.contains("vertical")); onScroll(); };
  $("#themeBtn").onclick=()=>{ document.documentElement.classList.toggle("dark");
    localStorage.setItem(LS.theme, document.documentElement.classList.contains("dark")?"dark":"light"); updThemeBtn(); };
  $("#tocBtn").onclick=()=>{ const t=$("#toc"); const show=!t.classList.contains("show");
    t.classList.toggle("show",show); $("#tocBtn").classList.toggle("on",show);
    if(show&&window.innerWidth<=820){ $("#scrim").classList.add("show"); } else if(window.innerWidth<=820){ $("#scrim").classList.remove("show"); } };
  $("#topFab").onclick=()=>{ const r=$("#reader"); if(r.classList.contains("vertical"))r.scrollLeft=0; else r.scrollTop=0; };
  $("#menuBtn").onclick=openSidebar;
  $("#scrim").onclick=closeMobilePanels;
  window.addEventListener("keydown",e=>{
    if(e.target.tagName==="INPUT") return;
    const r=$("#reader"); const vert=r.classList.contains("vertical");
    const step=r.clientHeight*0.85;
    if(e.key==="ArrowRight"||e.key==="PageDown"){ vert? r.scrollLeft-=step : r.scrollTop+=step; e.preventDefault(); }
    if(e.key==="ArrowLeft"||e.key==="PageUp"){ vert? r.scrollLeft+=step : r.scrollTop-=step; e.preventDefault(); }
    if(e.key==="ArrowDown"){ r.scrollTop+=80; }
    if(e.key==="ArrowUp"){ r.scrollTop-=80; }
  });
  window.addEventListener("hashchange",()=>{ const h=decodeURIComponent(location.hash.replace(/^#/,"")); if(!h){showWelcome();return;} if(curBook&&curBook.p===h)return; const b=M&&M.books.find(x=>x.p===h); if(b)openBook(b); });
}
function openSidebar(){ $("#sidebar").classList.add("open"); $("#scrim").classList.add("show"); }
function closeMobilePanels(){ if(window.innerWidth<=820){ $("#sidebar").classList.remove("open"); $("#toc").classList.remove("show"); $("#scrim").classList.remove("show"); } }
</script>
